# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Flask apphola

on:
  push:
    branches: [ "main" ]


permissions:
  contents: read
  packages: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
         pip install -r requirements.txt

    - name: Construir la imagen de Docker
      run: |
        docker build -t ghcr.io/michaeldlt1/holaflask:1.0.0 .

    - name: Login hacia GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.TOKEN_WR }}

    - name: Publicar la imagen de Docker
      run: |
        docker push ghcr.io/michaeldlt1/holaflask:1.0.0

    - name: Run tests
      run: |
        pytest
      
        
    